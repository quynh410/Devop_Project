name: Deploy DevOps Project

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 3.34.129.103
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd devops_project/react-app
            git pull
            docker-compose down
            docker-compose up -d --build
name: Deploy DevOps Project

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: 15.168.189.56
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd devops-project
            docker-compose down
            docker-compose up -d --build
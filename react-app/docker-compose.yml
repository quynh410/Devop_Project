version: "3.8"

services:

  db:
    image: postgres:14
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: rikkei_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rikkei_network

  backend:
    image: quynh41/backend:latest
    container_name: spring_backend
    depends_on:
      - db
    restart: always
    ports:
      - "8080:8080"
    networks:
      - rikkei_network

  frontend:
    image: quynh41/frontend:latest
    container_name: react_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
    networks:
      - rikkei_network

volumes:
  postgres_data:

networks:
  rikkei_network:
    driver: bridge